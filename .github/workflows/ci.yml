name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test
      # Deterministic pipeline end-to-end on the bundled fixture (no AI key in CI)
      - run: npm run demo
      - uses: actions/upload-artifact@v4
        with:
          name: triage-demo-output
          path: triage-output/
